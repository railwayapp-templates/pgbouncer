name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          tags: pgbouncer-e2e-test:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run e2e harness
        shell: bash
        run: |
          ./test/e2e.sh 2>&1 | tee e2e.log
          exit "${PIPESTATUS[0]}"

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p failure-artifacts
          mv e2e.log failure-artifacts/ 2>/dev/null || true
          docker ps -a > failure-artifacts/docker-ps.txt 2>&1 || true
          for c in $(docker ps -aq --filter "label=pgbouncer-e2e=1"); do
            name=$(docker inspect -f '{{.Name}}' "$c" | sed 's|^/||')
            docker logs --tail 200 "$c" > "failure-artifacts/container-${name}.log" 2>&1 || true
          done

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: failure-artifacts
          retention-days: 14
