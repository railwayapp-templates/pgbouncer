name: Build and Push PgBouncer Image

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight UTC (rebase on fresh alpine)
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - ".github/workflows/build-and-push.yml"

jobs:
  build-pgbouncer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Read PgBouncer version from Dockerfile
        id: get_version
        run: |
          VERSION=$(sed -n 's/^ARG VERSION=//p' Dockerfile | head -1)
          MAJOR_MINOR=${VERSION%.*}
          MAJOR=${VERSION%%.*}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR_MINOR}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "Building PgBouncer ${VERSION} with tags: ${VERSION}, ${MAJOR_MINOR}, ${MAJOR}, latest"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with multiple tags
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.major }}
            ghcr.io/${{ github.repository }}:latest
